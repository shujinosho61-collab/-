<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1b3a4b">
<title>嚥下スクリーニング判定</title>
<style>
  :root{
    --ink:#13262f; --line:#9fb4be; --bg:#eef2f3; --panel:#ffffff;
    --teal:#1b3a4b; --teal-soft:#e3edf0;
    --gold:#e9d85f; --gold-line:#b8a72c;
    --pink:#d6418c; --pink-soft:#fbe6f1;
    --done:#1b9e77; --done-soft:#e1f3ed;
    --dim:#7d929c;
    --warn:#c0492a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",sans-serif;}
  body{padding:env(safe-area-inset-top) 0 0 0;}
  header{
    position:sticky;top:0;z-index:30;background:var(--teal);color:#fff;
    padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;
    display:flex;align-items:center;gap:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.18);
  }
  header h1{font-size:15px;font-weight:700;margin:0;letter-spacing:.02em;flex:1;line-height:1.3}
  header .sub{font-size:11px;opacity:.75;font-weight:400;display:block;margin-top:1px}
  .btn{appearance:none;border:0;border-radius:8px;font-size:12.5px;font-weight:700;
    padding:8px 12px;cursor:pointer;white-space:nowrap}
  .btn-ghost{background:rgba(255,255,255,.16);color:#fff}
  .btn-ghost:active{background:rgba(255,255,255,.30)}

  /* progress / breadcrumb */
  #trail{position:sticky;top:54px;z-index:20;background:var(--panel);
    border-bottom:1px solid var(--line);padding:8px 14px;font-size:12px;
    color:var(--dim);min-height:36px;line-height:1.5}
  #trail b{color:var(--teal)}
  #trail .arw{color:var(--line);margin:0 5px}

  .wrap{padding:14px 12px 30px;max-width:560px;margin:0 auto}

  /* flow column */
  .stage{margin:0 0 4px}
  .conn{display:flex;justify-content:center;align-items:center;height:20px}
  .conn::before{content:"";width:2px;height:100%;background:var(--line)}
  .conn.active::before{background:var(--teal)}

  .node{
    background:var(--panel);border:2px solid var(--line);border-radius:14px;
    padding:13px 14px;display:block;width:100%;text-align:left;cursor:pointer;
    transition:border-color .15s, background .15s, transform .05s;
    position:relative;
  }
  .node:active{transform:scale(.99)}
  .node .q{font-size:11px;color:var(--dim);font-weight:700;letter-spacing:.04em;margin-bottom:2px}
  .node .title{font-size:15.5px;font-weight:800;line-height:1.35}
  .node .note{font-size:11.5px;color:var(--dim);margin-top:3px;line-height:1.4}

  .node.gold{background:var(--gold);border-color:var(--gold-line)}
  .node.gold .q{color:#6b6212}
  .node.current{border-color:var(--teal);box-shadow:0 0 0 4px var(--teal-soft)}
  .node.done{border-color:var(--done);background:var(--done-soft)}
  .node.done .picked{color:var(--done);font-weight:800;font-size:12.5px;margin-top:6px;
    display:flex;align-items:center;gap:5px}
  .node.done .picked::before{content:"✓";font-size:13px}

  /* options */
  .opts{display:grid;gap:8px;margin-top:11px}
  .opt{
    border:1.5px solid var(--line);background:#fff;border-radius:10px;
    padding:11px 12px;text-align:left;cursor:pointer;font-size:14px;font-weight:600;
    line-height:1.4;display:flex;align-items:center;gap:9px;transition:.12s;
  }
  .opt:active{background:var(--teal-soft)}
  .opt .k{flex:0 0 auto;width:20px;height:20px;border-radius:50%;border:1.5px solid var(--line);
    display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:var(--dim)}
  .opt small{display:block;font-weight:400;color:var(--dim);font-size:11.5px;margin-top:2px}

  /* result */
  .result{
    border:2px solid var(--pink);background:var(--pink-soft);border-radius:16px;
    padding:16px;text-align:center;
  }
  .result .rlabel{font-size:11px;font-weight:700;color:var(--pink);letter-spacing:.08em}
  .result .rmain{font-size:22px;font-weight:900;color:#9c2e6a;margin:6px 0 2px;line-height:1.3}
  .result .rsub{font-size:13px;color:#7a3a5e;line-height:1.5}
  .facility{background:#fff;border:1.5px solid var(--pink);border-radius:12px;
    padding:11px 13px;margin:13px 0 2px;text-align:left}
  .facility .flabel{font-size:10.5px;font-weight:800;color:var(--pink);letter-spacing:.06em;
    margin-bottom:7px;text-align:center}
  .facility .frow{display:flex;align-items:center;gap:10px;padding:4px 0}
  .facility .frow+.frow{border-top:1px dashed #f0c4dc}
  .facility .fk{flex:0 0 42px;font-size:11.5px;font-weight:800;color:#9c2e6a;
    background:var(--pink-soft);border-radius:6px;text-align:center;padding:3px 0}
  .facility .fv{font-size:15px;font-weight:700;color:var(--ink)}

  .branchnote{text-align:center;font-size:11.5px;color:var(--dim);margin:2px 0 6px}

  .pillrow{display:flex;gap:8px;margin-top:14px}
  .pillrow .btn{flex:1}
  .btn-main{background:var(--teal);color:#fff}
  .btn-main:active{background:#16313f}
  .btn-line{background:#fff;color:var(--teal);border:1.5px solid var(--teal)}

  .hidden{display:none}
  .fade{animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* toast */
  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;
    font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:50}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header>
  <div style="flex:1">
    <h1>摂食・嚥下スクリーニング判定
      <span class="sub">意識レベル → RSST → 水飲みテスト → 嚥下食レベル</span>
    </h1>
  </div>
  <button class="btn btn-ghost" id="resetBtn">最初から</button>
</header>

<div id="trail"><span style="color:var(--dim)">検査を開始してください</span></div>

<div class="wrap" id="flow"></div>

<div id="toast"></div>

<script>
/* ====== 判定ロジック（添付フローチャートに準拠） ====== */
/*
 各ステップ: id, q(小見出し), title, note, opts[{label, sub, next, result, branchNote}]
 next が string ならステップへ、result があれば終了ノード（嚥下食レベル等）
*/
const STEPS = {
  start: {
    q:"STEP 1 意識レベル", title:"意識レベル チェック",
    note:"JCS（Japan Coma Scale）で評価",
    opts:[
      {label:"JCS 1桁", sub:"覚醒している", next:"rsst"},
      {label:"JCS 2桁以上", sub:"刺激で覚醒〜昏睡", result:{name:"基礎訓練", sub:"嚥下機能精査・間接訓練から開始", kind:"warn"}}
    ]
  },
  rsst: {
    q:"STEP 2 反復唾液嚥下テスト（RSST）", title:"30秒間に空嚥下は何回できますか？",
    note:"喉頭挙上を触知して回数をカウント",
    opts:[
      {label:"3回以上 / 30秒", sub:"可能", next:"age"},
      {label:"1〜2回 / 30秒", sub:"可能", next:"mwst"},
      {label:"0回 / 30秒 または検査中むせあり", sub:"空嚥下できない", result:{name:"嚥下機能精査・基礎訓練", sub:"精査のうえ基礎訓練へ", kind:"warn"}}
    ]
  },
  age: {
    q:"STEP 3 年齢", title:"年齢は？",
    note:"年齢で次の水飲みテストが分岐します",
    opts:[
      {label:"64歳以下", sub:"→ 水飲みテスト（30ml）へ", next:"wst30"},
      {label:"65歳以上", sub:"→ 改訂水飲みテスト（3ml）へ", next:"mwst"}
    ]
  },
  mwst: {
    q:"改訂水飲みテスト（MWST・3ml）", title:"冷水3mlを嚥下。結果は？",
    note:"口腔底に注ぎ嚥下を指示し評価",
    opts:[
      {label:"嚥下なし、または むせ／湿性嗄声あり", sub:"", result:{name:"嚥下機能精査・基礎訓練", sub:"精査のうえ基礎訓練へ", kind:"warn"}},
      {label:"むせなし・湿性嗄声なし", sub:"良好", next:"wst30", branchNote:"※ 65歳以上で良好なら 水飲みテスト（30ml）へ"}
    ]
  },
  wst30: {
    q:"水飲みテスト（WST・30ml）", title:"常温水30mlを飲む。結果は？",
    note:"飲み方・むせ・湿性嗄声を評価",
    opts:[
      {label:"1回の嚥下で全量飲水可・むせなし・湿性嗄声なし", sub:"最良", next:"teeth"},
      {label:"複数回に分けて飲水必要・むせなし・湿性嗄声なし", sub:"", result:{name:"嚥下食Ⅱ（不均一なゼラチン寄せ）", sub:"段階的に上げていく", kind:"pink", shu:"ペースト粥", fuku:"ペースト"}},
      {label:"むせ・湿性嗄声あり／全量摂取できない", sub:"", result:{name:"開始食", sub:"嚥下食Ⅰ（均一なゼラチン寄せ）から", kind:"pink", shu:"ペースト粥", fuku:"ペースト"}}
    ]
  },
  teeth: {
    q:"STEP 4 義歯・咀嚼能力", title:"義歯の適合と咀嚼能力は？",
    note:"",
    opts:[
      {label:"義歯適合・咀嚼良好", sub:"", result:{name:"軟菜食", sub:"咀嚼良好。常食まで段階的に上げていく", kind:"good", shu:"軟飯", fuku:"一口大〜粗刻み"}},
      {label:"義歯不適合・咀嚼困難", sub:"", result:{name:"ソフト食・きざみ食・ピューレ", sub:"咀嚼状況に応じて調整", kind:"good", shu:"全粥〜軟飯", fuku:"きざみ〜ペースト"}}
    ]
  }
};

/* ====== 状態 ====== */
let path = []; // {stepId, q, title, choiceLabel, optIndex}
let current = "start";
let finished = null;

const flow = document.getElementById('flow');
const trail = document.getElementById('trail');

function render(){
  flow.innerHTML='';
  // render answered steps
  path.forEach((p,i)=>{
    if(i>0) flow.appendChild(connector(true));
    flow.appendChild(doneNode(p));
  });
  // current question
  if(current && !finished){
    if(path.length) flow.appendChild(connector(true));
    flow.appendChild(questionNode(STEPS[current]));
  }
  // result
  if(finished){
    flow.appendChild(connector(true));
    flow.appendChild(resultNode(finished));
  }
  renderTrail();
  // scroll active into view
  const act = document.querySelector('.node.current, .result');
  if(act) act.scrollIntoView({behavior:'smooth', block:'center'});
}

function connector(active){
  const d=document.createElement('div');
  d.className='conn'+(active?' active':'');
  return d;
}

function doneNode(p){
  const step=STEPS[p.stepId];
  const el=document.createElement('div');
  el.className='node done stage';
  el.innerHTML=`<div class="q">${step.q}</div>
    <div class="title">${step.title}</div>
    <div class="picked">${p.choiceLabel}</div>`;
  el.onclick=()=>rewind(p.stepId);
  return el;
}

function questionNode(step){
  const el=document.createElement('div');
  el.className='node current stage fade'+(step.q.includes('意識')||step.q.includes('RSST')||step.q.includes('年齢')||step.q.includes('咀嚼')?' ':' ');
  let optsHtml=step.opts.map((o,idx)=>`
    <button class="opt" data-i="${idx}">
      <span class="k">${idx+1}</span>
      <span>${o.label}${o.sub?`<small>${o.sub}</small>`:''}</span>
    </button>`).join('');
  el.innerHTML=`<div class="q">${step.q}</div>
    <div class="title">${step.title}</div>
    ${step.note?`<div class="note">${step.note}</div>`:''}
    <div class="opts">${optsHtml}</div>`;
  el.querySelectorAll('.opt').forEach(b=>{
    b.onclick=()=>choose(parseInt(b.dataset.i));
  });
  return el;
}

function resultNode(r){
  const el=document.createElement('div');
  el.className='result stage fade';
  const facility = (r.shu||r.fuku) ? `
    <div class="facility">
      <div class="flabel">当施設の食形態</div>
      <div class="frow"><span class="fk">主食</span><span class="fv">${r.shu||'—'}</span></div>
      <div class="frow"><span class="fk">副食</span><span class="fv">${r.fuku||'—'}</span></div>
    </div>` : '';
  el.innerHTML=`<div class="rlabel">判定結果</div>
    <div class="rmain">${r.name}</div>
    <div class="rsub">${r.sub||''}</div>
    ${facility}
    <div class="pillrow">
      <button class="btn btn-main" id="copyBtn">結果をコピー</button>
      <button class="btn btn-line" id="restartBtn">最初から</button>
    </div>`;
  el.querySelector('#copyBtn').onclick=copyResult;
  el.querySelector('#restartBtn').onclick=resetAll;
  return el;
}

function renderTrail(){
  if(!path.length && !finished){
    trail.innerHTML='<span style="color:var(--dim)">検査を開始してください</span>';return;
  }
  let parts=path.map(p=>`<b>${shorten(p.choiceLabel)}</b>`);
  if(finished) parts.push(`<b style="color:var(--pink)">→ ${finished.name}</b>`);
  trail.innerHTML=parts.join('<span class="arw">›</span>');
}
function shorten(s){return s.length>16?s.slice(0,15)+'…':s;}

function choose(i){
  const step=STEPS[current];
  const opt=step.opts[i];
  path.push({stepId:current, choiceLabel:opt.label, optIndex:i});
  if(opt.result){ finished=opt.result; current=null; }
  else { current=opt.next; }
  render();
}

function rewind(stepId){
  // jump back to that step, drop everything after
  const idx=path.findIndex(p=>p.stepId===stepId);
  if(idx<0)return;
  path=path.slice(0,idx);
  finished=null;
  current=stepId;
  render();
}

function resetAll(){
  path=[];current="start";finished=null;render();
}

function copyResult(){
  const d=new Date();
  const ts=`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  let lines=["【摂食・嚥下スクリーニング判定】", ts, ""];
  path.forEach((p,i)=>{
    lines.push(`${i+1}. ${STEPS[p.stepId].title}`);
    lines.push(`   → ${p.choiceLabel}`);
  });
  lines.push("");
  lines.push(`■ 判定結果：${finished.name}`);
  if(finished.sub) lines.push(`　${finished.sub}`);
  if(finished.shu||finished.fuku){
    lines.push("");
    lines.push("【当施設の食形態】");
    lines.push(`　主食：${finished.shu||'—'}`);
    lines.push(`　副食：${finished.fuku||'—'}`);
  }
  const text=lines.join("\n");
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>toast("コピーしました")).catch(()=>fallbackCopy(text));
  }else fallbackCopy(text);
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);
  ta.select();try{document.execCommand('copy');toast("コピーしました");}catch(e){toast("コピーできませんでした");}
  document.body.removeChild(ta);
}

let toastT;
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1600);
}

document.getElementById('resetBtn').onclick=resetAll;
render();

/* PWA: minimal service worker via blob for offline home-screen use */
if('serviceWorker' in navigator){
  const sw=`self.addEventListener('install',e=>self.skipWaiting());
  self.addEventListener('activate',e=>self.clients.claim());`;
  const url=URL.createObjectURL(new Blob([sw],{type:'text/javascript'}));
  navigator.serviceWorker.register(url).catch(()=>{});
}
</script>
</body>
</html>
